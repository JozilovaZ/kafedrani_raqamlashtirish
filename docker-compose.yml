version: '3.9'

services:
  web:
    build: .
    container_name: kafedra_web
    restart: always
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - db_volume:/app
    expose:
      - "8020"
    depends_on: []

  nginx:
    image: nginx:1.25-alpine
    container_name: kafedra_nginx
    restart: always
    ports:
      - "8030:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  static_volume:
  media_volume:
  db_volume:
