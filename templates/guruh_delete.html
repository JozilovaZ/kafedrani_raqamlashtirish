{% extends 'base.html' %}
{% block content %}
<div style="max-width:480px; margin:2rem auto;">
    <div class="card" style="padding:2rem; text-align:center;">
        <i class="fas fa-exclamation-triangle" style="font-size:2.5rem; color:#f59e0b; margin-bottom:1rem; display:block;"></i>
        <h3 style="margin:0 0 .5rem;">Guruhni o'chirish</h3>
        <p style="color:var(--text-secondary); margin-bottom:1.5rem;">
            <strong>{{ guruh.nomi }}</strong> guruhini o'chirishni tasdiqlaysizmi?
        </p>
        <div style="display:flex; gap:1rem; justify-content:center;">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary" style="background:#ef4444; border-color:#ef4444;">
                    <i class="fas fa-trash"></i> O'chirish
                </button>
            </form>
            <a href="{% url 'guruhlar_list' %}" class="btn btn-secondary">Bekor qilish</a>
        </div>
    </div>
</div>
{% endblock %}
