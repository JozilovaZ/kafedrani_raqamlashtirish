{% extends 'base.html' %}
{% block content %}
<div class="section-header">
    <h1 class="section-title">O'qituvchini o'chirish</h1>
</div>

<div class="card" style="max-width:500px; margin:0 auto; text-align:center;">
    <div class="card-body" style="padding:2.5rem;">
        <div style="font-size:3rem; color:#ef4444; margin-bottom:1rem;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 style="margin-bottom:.5rem;">Haqiqatan ham o'chirasizmi?</h2>
        <p style="color:var(--text-secondary); margin-bottom:2rem;">
            <strong>{{ oqituvchi.toliq_ism }}</strong> ning barcha ma'lumotlari va login hisob qaydnomasi o'chib ketadi.
            Bu amalni qaytarib bo'lmaydi.
        </p>
        <form method="post" style="display:flex; gap:1rem; justify-content:center;">
            {% csrf_token %}
            <button type="submit" class="btn" style="background:#ef4444; color:#fff;">
                <i class="fas fa-trash"></i> Ha, o'chirish
            </button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Bekor qilish</a>
        </form>
    </div>
</div>
{% endblock %}
