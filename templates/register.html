{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Ro'yxatdan o'tish — Academic Nexus</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background:linear-gradient(135deg,#1e293b 0%,#334155 100%); min-height:100vh;
               display:flex;align-items:center;justify-content:center;padding:20px; }
        .auth-card { background:#fff; padding:36px 40px; border-radius:14px;
                     box-shadow:0 20px 60px rgba(0,0,0,.3); width:480px; }
        .auth-logo { display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:8px; }
        .auth-logo .logo-icon { width:42px;height:42px;background:#1e293b;color:#fff;
                                border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px; }
        .auth-card h1 { text-align:center;font-size:22px;margin-top:10px;margin-bottom:4px; }
        .auth-card .subtitle { text-align:center;color:#64748b;margin-bottom:22px;font-size:13px; }
        .auth-form .form-group { margin-bottom:12px; }
        .auth-form .row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
        .auth-form label { display:block;font-size:12px;color:#475569;margin-bottom:6px;font-weight:500; }
        .auth-form input { width:100%;padding:11px 14px;border:1px solid #e2e8f0;border-radius:8px;
                           font-size:14px;font-family:inherit;outline:none;transition:.15s; }
        .auth-form input:focus { border-color:#1e293b;box-shadow:0 0 0 3px rgba(30,41,59,.1); }
        .auth-btn { width:100%;padding:12px;background:#1e293b;color:#fff;border:0;
                    border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;margin-top:8px; }
        .auth-btn:hover { background:#0f172a; }
        .auth-footer { text-align:center;margin-top:16px;font-size:13px;color:#64748b; }
        .auth-footer a { color:#1e293b;font-weight:600; }
        .alert { padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:13px; }
        .alert-error { background:#fee2e2;color:#b91c1c;border:1px solid #fecaca; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <strong>Academic Nexus</strong>
        </div>
        <h1>Ro'yxatdan o'tish</h1>
        <p class="subtitle">Yangi akkount yaratish</p>

        {% for m in messages %}
            <div class="alert alert-error">{{ m }}</div>
        {% endfor %}

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="row">
                <div class="form-group">
                    <label>Ism</label>
                    <input type="text" name="first_name" placeholder="Ism">
                </div>
                <div class="form-group">
                    <label>Familiya</label>
                    <input type="text" name="last_name" placeholder="Familiya">
                </div>
            </div>
            <div class="form-group">
                <label>Login *</label>
                <input type="text" name="username" placeholder="username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@example.com">
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Parol *</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Parolni tasdiqlang *</label>
                    <input type="password" name="password2" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="auth-btn">
                <i class="fas fa-user-plus"></i> Ro'yxatdan o'tish
            </button>
        </form>

        <div class="auth-footer">
            Akkountingiz bormi? <a href="{% url 'login' %}">Kirish</a>
        </div>
    </div>
</body>
</html>
