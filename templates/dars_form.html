{% extends 'base.html' %}
{% block content %}
<div class="section-header">
    <h1 class="section-title">{{ page_title }}</h1>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Orqaga
    </a>
</div>

{% if messages %}
<div class="messages-container">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}

<div class="card" style="max-width:650px; margin:0 auto;">
    <div class="card-body" style="padding:2rem;">
        <form method="post">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group">
                    <label>O'qituvchi *</label>
                    <select name="oqituvchi" class="form-control" required>
                        <option value="">-- Tanlang --</option>
                        {% for o in oqituvchilar %}
                        <option value="{{ o.pk }}">{{ o.toliq_ism }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Fan *</label>
                    <select name="fan" class="form-control" required>
                        <option value="">-- Tanlang --</option>
                        {% for f in fanlar %}
                        <option value="{{ f.pk }}">{{ f.nomi }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Guruh</label>
                    <select name="guruh" class="form-control">
                        <option value="">-- Tanlang --</option>
                        {% for g in guruhlar %}
                        <option value="{{ g.pk }}">{{ g.nomi }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Dars turi *</label>
                    <select name="turi" class="form-control" required>
                        <option value="maruza">Ma'ruza</option>
                        <option value="amaliyot">Amaliyot</option>
                        <option value="laboratoriya">Laboratoriya</option>
                        <option value="seminar">Seminar</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Hafta kuni *</label>
                    <select name="hafta_kuni" class="form-control" required>
                        {% for num, nom in kunlar %}
                        <option value="{{ num }}">{{ nom }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Semestr</label>
                    <select name="semestr" class="form-control">
                        <option value="1">1-semestr</option>
                        <option value="2">2-semestr</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Boshlanish vaqti *</label>
                    <input type="time" name="boshlanish_vaqti" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Tugash vaqti *</label>
                    <input type="time" name="tugash_vaqti" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Xona</label>
                    <input type="text" name="xona" class="form-control" placeholder="masalan: 305-A">
                </div>
            </div>
            <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Saqlash
                </button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">Bekor qilish</a>
            </div>
        </form>
    </div>
</div>

<style>
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
.form-group { display: flex; flex-direction: column; gap: .4rem; }
.form-group label { font-size: .85rem; font-weight: 600; color: var(--text-secondary); }
.form-control {
    padding: .55rem .9rem; border: 1px solid var(--border-color);
    border-radius: 8px; background: var(--bg-primary); color: var(--text-primary);
    font-size: .9rem; outline: none; transition: border-color .2s;
}
.form-control:focus { border-color: var(--primary-color); }
</style>
{% endblock %}
